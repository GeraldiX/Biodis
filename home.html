<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>BIODIS - Home</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0e1c15;
    color:white;
}

header{
    background:#163326;
    padding:20px;
    text-align:center;
}

nav{
    display:flex;
    justify-content:center;
    gap:15px;
    background:#12281e;
    padding:15px;
}

nav button{
    background:#1f4d38;
    border:none;
    color:white;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
}

section{
    padding:20px;
}

.card{
    background:#163326;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

.hidden{
    display:none;
}
</style>
</head>

<body>

<header>
🧬 BIODIS — Arquivo Geraldão
</header>

<nav>
<button onclick="show('bio')">🧬 Biologia</button>
<button onclick="show('geraldis')">🦖 Geraldis</button>
<button onclick="show('criacoes')">🎨 Criações</button>
</nav>

<section>

<div id="bio" class="card">
🧬 Conteúdo de Biologia vai aqui
</div>

<div id="geraldis" class="card hidden">
🦖 Zoeira da Geraldão vai aqui
</div>

<div id="criacoes" class="card hidden">
🎨 Artesanato e criações aqui
</div>

</section>

<script>
function show(id){
    document.getElementById("bio").classList.add("hidden");
    document.getElementById("geraldis").classList.add("hidden");
    document.getElementById("criacoes").classList.add("hidden");

    document.getElementById(id).classList.remove("hidden");
}
</script>

</body>
</html>
