<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BIODIS :: BIOS LOGIN</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

    <!-- MATRIX -->
    <canvas id="matrix"></canvas>

    <!-- GLOW -->
    <div class="bg-gradient"></div>

    <!-- GRID -->
    <div class="grid-overlay"></div>

    <!-- CRT -->
    <div class="scanlines"></div>

    <!-- VINHETA -->
    <div class="vignette"></div>

    <!-- GLITCH -->
    <div class="glitch-layer"></div>

    <main class="screen">

        <!-- ET -->
        <aside class="character left-character">

            <div class="character-glow"></div>

            <img
                src="img/et.png"
                alt="ET"
                id="alien">

        </aside>

        <!-- CENTRO -->
        <section class="center-panel">

            <!-- BIOS -->
            <section id="biosBoot" class="bios-window">

                <div class="bios-header">

                    <span>BIODIS BIOS v3.7</span>

                    <span>Initializing...</span>

                </div>

                <div id="biosText" class="bios-text"></div>

            </section>

            <!-- LOGIN -->
            <section id="loginBox" class="login-window hidden">

                <div class="login-border">

                    <header class="login-header">

                        <h1 class="logo glitch"
                            data-text="BIODIS">
                            BIODIS
                        </h1>

                        <p class="subtitle">
                            Biological Data Integrated System
                        </p>

                    </header>

                    <form id="loginForm" autocomplete="off">

                        <div class="field">

                            <label for="user">
                                USER
                            </label>

                            <input
                                id="user"
                                type="text"
                                placeholder="ENTER USERNAME">

                        </div>

                        <div class="field">

                            <label for="password">
                                PASSWORD
                            </label>

                            <input
                                id="password"
                                type="password"
                                placeholder="ENTER PASSWORD">

                        </div>

                        <button
                            id="btnLogin"
                            type="submit">

                            ACCESS SYSTEM

                        </button>

                    </form>

                    <footer class="login-footer">

                        <span class="status-led"></span>

                        <span id="statusText">

                            Awaiting authentication...

                        </span>

                    </footer>

                </div>

            </section>

        </section>

        <!-- GATO -->
        <aside class="character right-character">

            <div class="character-glow"></div>

            <img
                src="img/gato.png"
                alt="Gato"
                id="cat">

        </aside>

    </main>

    <!-- ÁUDIO -->
    <audio
        id="bootSound"
        preload="auto">

        <source src="audio/boot.mp3" type="audio/mpeg">

    </audio>

    <audio
        id="typeSound"
        preload="auto">

        <source src="audio/type.mp3" type="audio/mpeg">

    </audio>

    <audio
        id="successSound"
        preload="auto">

        <source src="audio/success.mp3" type="audio/mpeg">

    </audio>

    <script src="script.js"></script>

</body>

</html>
