<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BIODIS</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="login">

<!-- IMAGENS -->

<img src="assets/imagens/matrix.png" class="matrix">
<img src="assets/imagens/cat.png" class="cat">

<!-- TELA DE INICIALIZAÇÃO -->

<div id="boot">

<pre id="bootText">

BIODIS BIOS v1.0

Initializing...
Loading biological database...
Loading fungi...
Loading plants...
Loading weird discoveries...
Connecting...

██████████████████████

SYSTEM READY

</pre>

</div>

<!-- LOGIN -->

<div class="terminal" id="loginBox">

<div class="terminal-header">

BIODIS

</div>

<div class="terminal-body">

<p class="access">

ACCESS TERMINAL

</p>

<label>

Bio-nome

</label>

<input
type="text"
id="usuario"
placeholder="Digite seu Bio-nome"
>

<label>

Passe a Word

</label>

<input
type="password"
id="senha"
placeholder="********"
>

<button onclick="entrar()">

Entrar no laboratório

</button>

<p class="status">

>Aguardando autenticação...

</p>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
